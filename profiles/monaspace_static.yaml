type: static
cjk_font: embed_fonts/ZevHeiTC/VAR_OTF/ZevHeiTC-N-VF.otf
blocks: assets/unicode_blocks.txt
families:
  - directory_name: ZevCodeTC-GMA
    target_filename_prefix: ZevCodeTC-GMA-{variant}
    source_filename_prefix: MonaspaceArgon
    source_postscript_name: MonaspaceArgon
    target_postscript_name: ZevCodeTC-GMA-{variant}
    source_family_name: Monaspace Argon
    target_family_name: ZevCodeTC-GMA-{variant}
    ttf_companion: true
    files:
      - source_fonts/monaspace_static/MonaspaceArgon-Regular.otf
      - source_fonts/monaspace_static/MonaspaceArgon-Italic.otf
      - source_fonts/monaspace_static/MonaspaceArgon-ExtraLight.otf
      - source_fonts/monaspace_static/MonaspaceArgon-ExtraLightItalic.otf
      - source_fonts/monaspace_static/MonaspaceArgon-Light.otf
      - source_fonts/monaspace_static/MonaspaceArgon-LightItalic.otf
      - source_fonts/monaspace_static/MonaspaceArgon-Medium.otf
      - source_fonts/monaspace_static/MonaspaceArgon-MediumItalic.otf
      - source_fonts/monaspace_static/MonaspaceArgon-SemiBold.otf
      - source_fonts/monaspace_static/MonaspaceArgon-SemiBoldItalic.otf
      - source_fonts/monaspace_static/MonaspaceArgon-Bold.otf
      - source_fonts/monaspace_static/MonaspaceArgon-BoldItalic.otf
      - source_fonts/monaspace_static/MonaspaceArgon-ExtraBold.otf
      - source_fonts/monaspace_static/MonaspaceArgon-ExtraBoldItalic.otf
  - directory_name: ZevCodeTC-GMN
    target_filename_prefix: ZevCodeTC-GMN-{variant}
    source_filename_prefix: MonaspaceNeon
    source_postscript_name: MonaspaceNeon
    target_postscript_name: ZevCodeTC-GMN-{variant}
    source_family_name: Monaspace Neon
    target_family_name: ZevCodeTC-GMN-{variant}
    ttf_companion: true
    files:
      - source_fonts/monaspace_static/MonaspaceNeon-Regular.otf
      - source_fonts/monaspace_static/MonaspaceNeon-Italic.otf
      - source_fonts/monaspace_static/MonaspaceNeon-ExtraLight.otf
      - source_fonts/monaspace_static/MonaspaceNeon-ExtraLightItalic.otf
      - source_fonts/monaspace_static/MonaspaceNeon-Light.otf
      - source_fonts/monaspace_static/MonaspaceNeon-LightItalic.otf
      - source_fonts/monaspace_static/MonaspaceNeon-Medium.otf
      - source_fonts/monaspace_static/MonaspaceNeon-MediumItalic.otf
      - source_fonts/monaspace_static/MonaspaceNeon-SemiBold.otf
      - source_fonts/monaspace_static/MonaspaceNeon-SemiBoldItalic.otf
      - source_fonts/monaspace_static/MonaspaceNeon-Bold.otf
      - source_fonts/monaspace_static/MonaspaceNeon-BoldItalic.otf
      - source_fonts/monaspace_static/MonaspaceNeon-ExtraBold.otf
      - source_fonts/monaspace_static/MonaspaceNeon-ExtraBoldItalic.otf
variants:
  S:
    cjk_axis: "wdth=100,IDSP=0"
    cjk_transform: "2,0,0,2,0,5"
    italic:
      cjk_transform: "2,0,0.36,2,0,5"
    normalize_width:
      - codepoints: [[A960, A97F], [AC00, D7AF], [D7B0, D7FF]]
        width: 1000
  B:
    # Monospace glyph width is 1240 :\
    cjk_axis: "wdth=105,IDSP=190"
    cjk_transform: "2,0,0,2,0,5"
    italic:
      cjk_transform: "2,0,0.36,2,0,5"
    normalize_width:
      - codepoints: [[A960, A97F], [AC00, D7AF], [D7B0, D7FF]]
        width: 1240
weights:
  extralight:
    cjk_axis_override: "wght=300"
  light:
    cjk_axis_override: "wght=365"
  regular:
    cjk_axis_override: "wght=450"
  medium:
    cjk_axis_override: "wght=550"
  semibold:
    cjk_axis_override: "wght=650"
  bold:
    cjk_axis_override: "wght=750"
  extrabold:
    cjk_axis_override: "wght=850"
