type: static
cjk_font: embed_fonts/ZevHeiTC/VAR_OTF/ZevHeiTC-N-VF.otf
blocks: assets/unicode_blocks.txt
families:
  - directory_name: ZevCodeTC-MSM
    source_filename_prefix: MonaSansMono
    target_filename_prefix: ZevCodeTC-MSM-{variant}
    source_postscript_name: MonaSansMono
    target_postscript_name: ZevCodeTC-MSM-{variant}
    source_family_name: Mona Sans Mono
    target_family_name: ZevCodeTC-MSM-{variant}
    ttf_companion: true
    files:
      - glob: source_fonts/mona_sans_static/MonaSansMono-*.otf
variants:
  S:
    cjk_axis: "wdth=100,IDSP=0"
    normalize_width:
      - codepoints: [[A960, A97F], [AC00, D7AF], [D7B0, D7FF]]
        width: 1000
  B:
    # Monospace glyph width is 618.
    cjk_axis: "wdth=110,IDSP=136"
    normalize_width:
      - codepoints: [[A960, A97F], [AC00, D7AF], [D7B0, D7FF]]
        width: 1236
weights:
  extralight:
    cjk_axis_override: "wght=200"
  light:
    cjk_axis_override: "wght=300"
  regular:
    cjk_axis_override: "wght=400"
  medium:
    cjk_axis_override: "wght=500"
  semibold:
    cjk_axis_override: "wght=600"
  bold:
    cjk_axis_override: "wght=700"
  extrabold:
    cjk_axis_override: "wght=800"
  black:
    cjk_axis_override: "wght=900"
